name: Release Please

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Check bootstrap release tag
        id: bootstrap
        shell: bash
        run: |
          if git ls-remote --exit-code --tags \
            "https://github.com/${{ github.repository }}.git" \
            refs/tags/v1.0.0 >/dev/null 2>&1; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::v1.0.0 does not exist yet; release-please is disabled until the bootstrap release is published."
          fi

      - name: Release Please
        if: steps.bootstrap.outputs.ready == 'true'
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: .github/release/release-please-config.json
          manifest-file: .github/release/release-please-manifest.json
