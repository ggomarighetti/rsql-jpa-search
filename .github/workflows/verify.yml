name: Verify

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        java: ["17", "25"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Verify
        run: ./mvnw -nsu verify

      - name: Upload A-03 query plans
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a03-postgres-plans-java-${{ matrix.java }}
          path: target/a03-plans/**
          if-no-files-found: warn
          retention-days: 14

  fuzz-regression:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Jazzer regression harness
        run: ./mvnw -nsu -Pfuzz "-Dtest=RsqlSearchGuardFuzzTest" test
